# PostgreSQL configuration.
# Connection params read from env so the same config works for host-local Postgres
# and Docker Compose. See docker-compose.yml for the dev values.

default: &default
  adapter: postgresql
  encoding: unicode
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("DATABASE_HOST", "localhost") %>
  port: <%= ENV.fetch("DATABASE_PORT", 5432) %>
  username: <%= ENV.fetch("DATABASE_USERNAME", "postgres") %>
  password: <%= ENV.fetch("DATABASE_PASSWORD", "") %>

development:
  <<: *default
  database: <%= ENV.fetch("DATABASE_NAME", "widget_platform_development") %>

test:
  <<: *default
  database: <%= ENV.fetch("DATABASE_NAME_TEST", "widget_platform_test") %>

production:
  <<: *default
  database: widget_platform_production
  username: widget_platform
  password: <%= ENV["WIDGET_PLATFORM_DATABASE_PASSWORD"] %>
